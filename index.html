<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawSteps — Swiss Minimalist</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <!-- p5.js for generative background -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
</head>
<body>
    <!-- Generative Background Layer -->
    <div id="canvas-parent"></div>

    <div class="app-container">
        <header>
            <div class="logo">
                <h1>PawSteps<span>®</span></h1>
            </div>
            <nav>
                <button id="add-walk-btn" class="btn-minimal">+ Record Moment</button>
            </nav>
        </header>

        <main>
            <section class="hero">
                <h2>SAME PATH,<br>DIFFERENT MOMENTS.</h2>
                <p>Capture the subtle traces of your daily walk.</p>
            </section>

            <section id="feed" class="feed-grid">
                <!-- Records will be injected here -->
                <div class="loader">Loading...</div>
            </section>
        </main>

        <!-- Record Modal -->
        <div id="modal" class="modal hidden">
            <div class="modal-content minimalist-card">
                <h3>NEW RECORD</h3>
                <form id="walk-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>MOOD</label>
                            <select id="mood" required>
                                <option value="happy">HAPPY</option>
                                <option value="energetic">ENERGETIC</option>
                                <option value="calm">CALM</option>
                                <option value="curious">CURIOUS</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>DIST (KM)</label>
                            <input type="number" id="distance" step="0.1" placeholder="0.0" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>MOMENT TAGS</label>
                        <div id="tag-container" class="tag-selector">
                            <button type="button" class="tag-chip" data-tag="SCENT">#SCENT</button>
                            <button type="button" class="tag-chip" data-tag="FRIEND">#FRIEND</button>
                            <button type="button" class="tag-chip" data-tag="VIEW">#VIEW</button>
                            <button type="button" class="tag-chip" data-tag="RUN">#RUN</button>
                            <button type="button" class="tag-chip" data-tag="SNACK">#SNACK</button>
                        </div>
                        <input type="hidden" id="selected-tags" value="">
                    </div>

                    <div class="form-group">
                        <label>NOTE</label>
                        <textarea id="note" placeholder="Write down the subtle moments..." required></textarea>
                    </div>

                    <div class="modal-actions">
                        <button type="button" id="close-modal" class="btn-text">CANCEL</button>
                        <button type="submit" class="btn-solid">SAVE MOMENT</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Photo Trace Overlay: opened by clicking a photo stamp in the mouse trail -->
        <div id="photo-overlay" class="modal hidden">
            <div class="minimalist-card photo-overlay-content">
                <img id="overlay-img" src="" alt="Trace photo">
                <p id="overlay-caption"></p>
                <div class="modal-actions">
                    <button type="button" id="close-photo-overlay" class="btn-text">CLOSE</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="sketch.js"></script>
    <script src="app.js"></script>
</body>
</html>
