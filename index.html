<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawSteps - 오늘의 산책을 기록하세요</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <span class="icon">🐾</span>
                <h1>PawSteps</h1>
            </div>
            <nav>
                <button id="add-walk-btn" class="btn-primary">+ 산책 기록</button>
            </nav>
        </header>

        <main>
            <section class="hero">
                <h2>매일 같은 길, <br><span>매번 다른 순간.</span></h2>
                <p>오늘 반려견과 함께 본 풍경, 느낀 감정을 기록하고 나누세요.</p>
            </section>

            <section id="feed" class="feed-container">
                <!-- Records will be injected here -->
                <div class="loader">기록을 불러오는 중...</div>
            </section>
        </main>

        <!-- Record Modal -->
        <div id="modal" class="modal hidden">
            <div class="modal-content glass">
                <h3>오늘의 산책 기록</h3>
                <form id="walk-form">
                    <div class="form-group">
                        <label for="mood">오늘의 기분</label>
                        <select id="mood" required>
                            <option value="happy">행복함 😊</option>
                            <option value="energetic">활기참 🐕</option>
                            <option value="calm">평온함 🌿</option>
                            <option value="curious">호기심 🧐</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="distance">산책 거리 (km)</label>
                        <input type="number" id="distance" step="0.1" placeholder="예: 2.5" required>
                    </div>
                    <div class="form-group">
                        <label>오늘의 특별한 순간 (태그)</label>
                        <div id="tag-container" class="tag-selector">
                            <button type="button" class="tag-chip" data-tag="킁킁">#킁킁 👃</button>
                            <button type="button" class="tag-chip" data-tag="친구만남">#친구만남 🐕</button>
                            <button type="button" class="tag-chip" data-tag="풍경">#풍경 🌅</button>
                            <button type="button" class="tag-chip" data-tag="우다다">#우다다 💨</button>
                            <button type="button" class="tag-chip" data-tag="간식">#간식 🍖</button>
                        </div>
                        <input type="hidden" id="selected-tags" value="">
                    </div>
                    <div class="form-group">
                        <label for="note">기억하고 싶은 순간</label>
                        <textarea id="note" placeholder="오늘 어떤 일이 있었나요? 태그와 함께 기록해보세요." required></textarea>
                    </div>
                    <div class="modal-actions">
                        <button type="button" id="close-modal" class="btn-secondary">취소</button>
                        <button type="submit" class="btn-primary">순간 저장하기</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
